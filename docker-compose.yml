services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: longbrain-qdrant
    restart: unless-stopped
    ports:
      # Bind localhost-only: Qdrant has no auth; exposing 0.0.0.0 lets the
      # whole LAN read/delete memory (the dashboard can drop collections too).
      - "127.0.0.1:6333:6333"   # REST API + dashboard
      - "127.0.0.1:6334:6334"   # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  llamaindex:
    build:
      context: ./llamaindex-service
      args:
        EMBED_PROVIDER: "${EMBED_PROVIDER:-fastembed}"
        EMBED_MODEL: "${EMBED_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}"
        # Doc-search stack (torch + sentence-transformers) is opt-in: memory-
        # only installs keep the lean image. scripts/enable_doc_search.sh
        # flips this together with DOC_EMBED_* and rebuilds.
        INSTALL_DOC_SEARCH: "${INSTALL_DOC_SEARCH:-false}"
    # Explicit tag — otherwise compose names the built image after the folder
    # (hermes-agent-llamaindex). The compose PROJECT name must stay untouched:
    # volumes are prefixed with it, renaming it would orphan the data.
    image: longbrain-llamaindex
    container_name: longbrain-llamaindex
    restart: unless-stopped
    ports:
      - "127.0.0.1:8800:8000"   # localhost-only; keep 8000 free for Hermes' own hindsight memory server
    environment:
      QDRANT_URL: "http://qdrant:6333"
      EMBED_PROVIDER: "${EMBED_PROVIDER:-fastembed}"
      EMBED_MODEL: "${EMBED_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}"
      # Separate documents embedder (docs/SEARCH_SPEC.md). Empty = documents
      # share EMBED_MODEL. Changing it on existing data requires
      # scripts/migrate_doc_embed.py.
      DOC_EMBED_PROVIDER: "${DOC_EMBED_PROVIDER:-}"
      DOC_EMBED_MODEL: "${DOC_EMBED_MODEL:-}"
      DOC_RERANK: "${DOC_RERANK:-false}"
      DOC_RERANK_MODEL: "${DOC_RERANK_MODEL:-BAAI/bge-reranker-v2-m3}"
      DOC_RERANK_CANDIDATES: "${DOC_RERANK_CANDIDATES:-20}"
      # Optional tier (local LLM only; degrades gracefully without Ollama)
      DOC_LLM_PROVIDER: "${DOC_LLM_PROVIDER:-ollama}"
      DOC_LLM_MODEL: "${DOC_LLM_MODEL:-qwen3:latest}"
      DOC_ENRICH: "${DOC_ENRICH:-true}"
      LLM_PROVIDER: "${LLM_PROVIDER:-none}"
      LLM_MODEL: "${LLM_MODEL:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      NVIDIA_API_KEY: "${NVIDIA_API_KEY:-}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
      CONSOLIDATION_ENABLED: "${CONSOLIDATION_ENABLED:-true}"
      CONSOLIDATION_INTERVAL: "${CONSOLIDATION_INTERVAL:-0}"
      CONSOLIDATION_SWEEP_DEBOUNCE: "${CONSOLIDATION_SWEEP_DEBOUNCE:-600}"
      CONSOLIDATION_IDLE_SECONDS: "${CONSOLIDATION_IDLE_SECONDS:-900}"
      CONSOLIDATION_MIN_TURNS: "${CONSOLIDATION_MIN_TURNS:-2}"
      CONSOLIDATION_MAX_FACTS: "${CONSOLIDATION_MAX_FACTS:-5}"
      CONSOLIDATION_MIN_IMPORTANCE: "${CONSOLIDATION_MIN_IMPORTANCE:-0.5}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      # LONGBRAIN_USER_ID is the current name; HERMES_USER_ID stays a legacy alias.
      LONGBRAIN_USER_ID: "${LONGBRAIN_USER_ID:-${HERMES_USER_ID:-local}}"
      DOCUMENTS_COLLECTION: "${DOCUMENTS_COLLECTION:-longbrain_documents}"
      CHAT_HISTORY_COLLECTION: "${CHAT_HISTORY_COLLECTION:-longbrain_chat_history}"
      MEMORIES_COLLECTION: "${MEMORIES_COLLECTION:-longbrain_memories}"
      CHAT_MEMORY_TOKEN_LIMIT: "${CHAT_MEMORY_TOKEN_LIMIT:-3000}"
      # Recall/dedup tuning knobs (defaults mirror app/config.py — every
      # .env override must be listed here or it never reaches the container).
      RECALL_MIN_SCORE: "${RECALL_MIN_SCORE:-0.25}"
      RECALL_TOP_K_MEMORIES: "${RECALL_TOP_K_MEMORIES:-5}"
      RECALL_TOP_K_HISTORY: "${RECALL_TOP_K_HISTORY:-3}"
      RECALL_TOP_K_DOCS: "${RECALL_TOP_K_DOCS:-2}"
      RECALL_RECENT_TURNS: "${RECALL_RECENT_TURNS:-6}"
      RECALL_DOC_SNIPPET_CHARS: "${RECALL_DOC_SNIPPET_CHARS:-600}"
      RECALL_PROJECT_BOOST: "${RECALL_PROJECT_BOOST:-1.5}"
      RECALL_PREFERENCE_BOOST: "${RECALL_PREFERENCE_BOOST:-1.5}"
      MEMORY_HALF_LIFE_DAYS: "${MEMORY_HALF_LIFE_DAYS:-90}"
      HISTORY_HALF_LIFE_DAYS: "${HISTORY_HALF_LIFE_DAYS:-30}"
      SUPERSEDE_SIMILARITY: "${SUPERSEDE_SIMILARITY:-0.92}"
      DEDUP_LLM_CHECK_MIN: "${DEDUP_LLM_CHECK_MIN:-0.60}"
      HYBRID_BM25: "${HYBRID_BM25:-true}"
      RECALL_BM25_WEIGHT: "${RECALL_BM25_WEIGHT:-0.6}"
      BM25_MODEL: "${BM25_MODEL:-Qdrant/bm25}"
      RETRIEVAL_TOP_K: "${RETRIEVAL_TOP_K:-4}"
      CHAT_HISTORY_MAX_MESSAGES: "${CHAT_HISTORY_MAX_MESSAGES:-200}"
    volumes:
      - longbrain_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # Optional local LLM — only started with: docker compose --profile ollama up -d
  # Then set LLM_PROVIDER=ollama and OLLAMA_BASE_URL=http://ollama:11434 in .env.
  ollama:
    image: ollama/ollama:latest
    container_name: longbrain-ollama
    restart: unless-stopped
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  qdrant_data:
  longbrain_data:
    # Explicit name: unprefixed, so renaming the repo folder (= compose
    # project name) later cannot orphan the data.
    name: longbrain_data
  ollama_data:
